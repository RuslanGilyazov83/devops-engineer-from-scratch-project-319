# Пример: prod-профиль и внешняя PostgreSQL (подставь host/пароль через CI или --set).
config:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://REPLACE_HOST:5432/bulletins"
  SPRING_DATASOURCE_USERNAME: "bulletins"
  SPRING_DATASOURCE_PASSWORD: ""

secret:
  create: true
  stringData:
    SPRING_DATASOURCE_URL: ""
    SPRING_DATASOURCE_USERNAME: ""
    SPRING_DATASOURCE_PASSWORD: ""
    STORAGE_S3_ACCESSKEY: ""
    STORAGE_S3_SECRETKEY: ""

# Включи Ingress и TLS, когда в кластере есть ingress-controller и сертификат.
ingress:
  enabled: false
  host: bulletin.example.com
  tls:
    enabled: false
    secretName: bulletin-tls
