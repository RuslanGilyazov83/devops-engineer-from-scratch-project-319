# Базовые значения. Переопределения — через -f values-<env>.yaml и/или --set / --set-file.

nameOverride: ""
fullnameOverride: ""

image:
  repository: ruslangilyazov/project-devops-deploy
  tag: "0.0.1"
  pullPolicy: IfNotPresent

replicaCount: 2

revisionHistoryLimit: 3

rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1024Mi"

# Имена ресурсов (совместимость с прежними манифестами).
names:
  deployment: bulletin-app
  configMap: bulletin-config
  secret: bulletin-secret
  service: bulletin-app

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

# Ingress (опционально; по умолчанию доступ через LoadBalancer Service).
ingress:
  enabled: false
  className: nginx
  annotations: {}
  host: bulletin.local
  path: /
  pathType: Prefix
  tls:
    enabled: false
    secretName: ""

config:
  SPRING_PROFILES_ACTIVE: "dev"
  MANAGEMENT_SERVER_PORT: "9090"
  STORAGE_S3_BUCKET: "projectdevopsdeploy"
  STORAGE_S3_REGION: "ru-central1"
  STORAGE_S3_ENDPOINT: "https://storage.yandexcloud.net"
  SPRING_DATASOURCE_URL: "jdbc:h2:mem:bulletins;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
  SPRING_DATASOURCE_USERNAME: "sa"
  SPRING_DATASOURCE_PASSWORD: ""

prometheus:
  scrape: true
  port: "9090"
  path: "/actuator/prometheus"

topologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

probes:
  readiness:
    path: /actuator/health/readiness
    portName: mgmt
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 6
  liveness:
    path: /actuator/health/liveness
    portName: mgmt
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 4

# Secret: либо создаём из chart, либо используем уже существующий (ExternalSecrets / kubectl).
secret:
  create: true
  existingSecretName: ""
  stringData:
    SPRING_DATASOURCE_URL: ""
    SPRING_DATASOURCE_USERNAME: ""
    SPRING_DATASOURCE_PASSWORD: ""
    STORAGE_S3_ACCESSKEY: ""
    STORAGE_S3_SECRETKEY: ""

pdb:
  enabled: true
  maxUnavailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
