{{- if and .Values.secret.create (not .Values.secret.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.names.secret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Значения берутся из values; для продакшена лучше --set-file или внешний Secret.
  SPRING_DATASOURCE_URL: {{ .Values.secret.stringData.SPRING_DATASOURCE_URL | default "" | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.secret.stringData.SPRING_DATASOURCE_USERNAME | default "" | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.secret.stringData.SPRING_DATASOURCE_PASSWORD | default "" | quote }}
  STORAGE_S3_ACCESSKEY: {{ .Values.secret.stringData.STORAGE_S3_ACCESSKEY | default "" | quote }}
  STORAGE_S3_SECRETKEY: {{ .Values.secret.stringData.STORAGE_S3_SECRETKEY | default "" | quote }}
{{- end }}
